services:
  - type: web
    name: miner-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - Dockerfile
        - Dockerfile.cli
        - Dockerfile.converter
        - requirements.txt
        - pyproject.toml
        - render.yaml
        - docker-compose.yml
        - src/**
        - scripts/**
        - tests/**
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
